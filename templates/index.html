<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title id="pageTitle">NeonHub</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{--bg:#0a0a0a;--glass:rgba(20,20,30,0.7);--border:rgba(0,255,255,0.2);--blue:#00f3ff;--green:#39ff14;--text:#fff;--text2:#b0b0c0;--radius:24px;--nav:70px}
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:var(--nav)}
    .bg{position:fixed;top:0;left:0;width:100%;height:100%;background:radial-gradient(circle at 50% 50%,rgba(0,243,255,0.08) 0%,transparent 50%),radial-gradient(circle at 80% 20%,rgba(57,255,20,0.05) 0%,transparent 40%);animation:pulse 12s infinite alternate;z-index:0}
    @keyframes pulse{0%{opacity:0.6}100%{opacity:1}}
    .app{position:relative;z-index:1;max-width:1300px;margin:0 auto;padding:20px 20px 0}
    .glass{background:var(--glass);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:var(--radius);box-shadow:0 8px 32px rgba(0,0,0,0.3)}
    .bottom-nav{position:fixed;bottom:0;left:0;right:0;height:var(--nav);background:rgba(10,10,15,0.95);backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;justify-content:space-around;align-items:center;z-index:100}
    .nav-item{flex:1;display:flex;flex-direction:column;align-items:center;color:var(--text2);font-size:12px;cursor:pointer;padding:8px 0}
    .nav-item i{font-size:22px;margin-bottom:4px}
    .nav-item.active{color:var(--blue);text-shadow:0 0 10px var(--blue)}
    .page{display:none}
    .page.active{display:block}
    .broadcast-banner{background:linear-gradient(135deg,var(--green),var(--blue));color:#000;padding:20px 25px;border-radius:30px;margin-bottom:25px;display:flex;align-items:center;justify-content:space-between;font-weight:700;font-size:1.2rem}
    .broadcast-banner button{background:rgba(0,0,0,0.3);border:none;color:#fff;padding:10px 25px;border-radius:40px;font-weight:600;cursor:pointer}
    .header{padding:30px;margin-bottom:25px;text-align:center}
    .neon-blue{font-size:3.5rem;font-weight:700;text-shadow:0 0 15px var(--blue),0 0 30px var(--blue)}
    .neon-green{text-shadow:0 0 15px var(--green),0 0 30px var(--green)}
    .card{padding:25px;margin-bottom:25px}
    .input-group{display:flex;gap:15px;flex-wrap:wrap}
    .neon-input{flex:1;min-width:250px;padding:16px 20px;background:rgba(0,0,0,0.4);border:2px solid rgba(0,243,255,0.3);border-radius:16px;color:#fff;font-size:1rem;outline:none}
    .neon-input:focus{border-color:var(--blue);box-shadow:0 0 25px var(--blue)}
    .neon-button{padding:16px 32px;background:linear-gradient(135deg,rgba(0,243,255,0.2),rgba(57,255,20,0.1));border:1px solid var(--blue);border-radius:16px;color:#fff;font-weight:600;cursor:pointer;transition:all 0.3s;font-size:1rem}
    .neon-button:hover{box-shadow:0 0 30px var(--blue);transform:translateY(-2px)}
    #extractBtn{padding:20px 48px !important;font-size:1.5rem !important;font-weight:700 !important;background:linear-gradient(135deg, var(--blue) 0%, var(--green) 100%) !important;border:none !important;box-shadow:0 0 30px var(--blue) !important;color:#000 !important;letter-spacing:1px;width:auto;}
    #extractBtn:hover{transform:scale(1.05) !important;box-shadow:0 0 50px var(--blue) !important;}
    .preview-header{display:flex;gap:20px;margin-bottom:25px}
    .thumbnail{width:160px;height:90px;object-fit:cover;border-radius:14px;border:1px solid var(--border)}
    .video-player-wrapper{border-radius:16px;overflow:hidden;border:1px solid var(--border);margin-bottom:25px;background:#000}
    .neon-video{width:100%;display:block;max-height:70vh}
    .history-card{padding:20px;margin-top:20px}
    .history-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:15px}
    .history-list{display:flex;flex-direction:column;gap:10px}
    .history-item{display:flex;align-items:center;gap:15px;padding:12px 15px;background:rgba(0,0,0,0.3);border-radius:14px;cursor:pointer;border:1px solid transparent}
    .history-item:hover{border-color:var(--blue);background:rgba(0,243,255,0.1)}
    .history-thumb{width:80px;height:45px;object-fit:cover;border-radius:8px}
    .admin-section{padding:25px;margin-bottom:25px}
    .logout-btn{background:rgba(255,80,80,0.15);border:1px solid #ff5050;color:#ff8080;padding:10px 20px;border-radius:30px;cursor:pointer}
    .hidden{display:none !important}
    .error{color:#ff4d4d;margin-top:10px}
    .clear-btn{background:none;border:1px solid var(--border);border-radius:20px;padding:6px 12px;color:var(--text2);cursor:pointer;font-size:0.9rem}
    .clear-btn:hover{color:var(--blue);border-color:var(--blue)}
    .status-text{padding:20px;text-align:center;color:var(--blue);font-size:1.2rem}
    .spinner{display:inline-block;width:20px;height:20px;border:2px solid var(--blue);border-top-color:transparent;border-radius:50%;animation:spin 0.8s linear infinite;margin-right:10px}
    @keyframes spin{to{transform:rotate(360deg)}}
    @media (max-width:768px){
      .neon-blue{font-size:2.5rem}
      #extractBtn{width:100% !important;padding:18px 24px !important;font-size:1.3rem !important;}
    }
  </style>
</head>
<body>
<div class="bg"></div>
<div class="app">
  <div id="broadcastBanner" class="broadcast-banner hidden"></div>

  <!-- STREAMER PAGE -->
  <div id="downloaderPage" class="page active">
    <div class="header glass">
      <h1><span class="neon-blue">Neon</span><span class="neon-green">Tube</span></h1>
      <p style="color:var(--text2);margin-top:10px">⚡ Instant 720p streaming · Lightweight & Fast</p>
    </div>
    <div class="card glass">
      <div class="input-group">
        <input type="text" id="urlInput" placeholder="📎 Paste YouTube URL..." class="neon-input">
        <button id="extractBtn" class="neon-button"><i class="fas fa-bolt"></i> Stream</button>
      </div>
      <p style="color:var(--text2);font-size:0.85rem;margin-top:8px;">
        💡 Paste a YouTube link and press Stream – video plays instantly.
      </p>
      <div id="errorMessage" class="error"></div>
    </div>
    <div id="loadingContainer" class="card glass hidden">
      <div class="status-text">
        <span class="spinner"></span> <span id="statusMessage">Fetching stream...</span>
      </div>
    </div>
    <div id="previewCard" class="card glass hidden">
      <div class="preview-header">
        <img id="thumbnail" src="" class="thumbnail">
        <div><h3 id="videoTitle"></h3><p><span id="duration"></span> <button id="copyTitleBtn"><i class="far fa-copy"></i></button></p></div>
      </div>
      <div class="video-player-wrapper"><video id="videoPlayer" controls class="neon-video"></video></div>
    </div>
    <div class="history-card glass">
      <div class="history-header">
        <h3><i class="fas fa-history"></i> Recent</h3>
        <button id="clearHistoryBtn" class="clear-btn"><i class="fas fa-trash-alt"></i> Clear</button>
      </div>
      <div id="historyList" class="history-list"></div>
    </div>
  </div>

  <!-- ADMIN PAGE -->
  <div id="adminPage" class="page">
    <div id="adminLoginPanel" class="admin-section glass">
      <h3>🔐 Admin</h3>
      <input type="password" id="adminPassword" class="neon-input" placeholder="Password" style="width:100%;margin:15px 0">
      <button id="adminLoginBtn" class="neon-button" style="width:100%">Login</button>
      <p id="adminLoginError" class="error"></p>
    </div>
    <div id="adminDashboard" class="hidden">
      <div class="admin-section glass">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
          <h3>⚙️ Settings</h3>
          <button id="adminLogoutBtn" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </div>
        <div style="margin-bottom:15px">
          <label style="display:flex;align-items:center;gap:10px">
            <input type="checkbox" id="maintenanceToggle"> Maintenance Mode
          </label>
        </div>
        <input id="maintenanceMessage" class="neon-input" placeholder="Maintenance message" style="margin:10px 0;width:100%">
        <input id="siteTitleInput" class="neon-input" placeholder="Site Title" style="margin:10px 0;width:100%">
        <button id="saveSettingsBtn" class="neon-button">💾 Save</button>
      </div>
      <div class="admin-section glass">
        <h3>📢 Broadcast</h3>
        <div style="display:flex;gap:10px">
          <input id="broadcastMsgInput" class="neon-input" placeholder="Announcement...">
          <button id="sendBroadcastBtn" class="neon-button">Send</button>
        </div>
        <p style="color:var(--text2);font-size:0.85rem;margin-top:8px;">Banner appears at top.</p>
      </div>
      <div class="admin-section glass">
        <h3>🧹 Cache</h3>
        <button id="clearStreamCacheBtn" class="neon-button" style="background:rgba(255,80,80,0.2);border-color:#ff5050;color:#ff8080;"><i class="fas fa-database"></i> Clear Stream Cache</button>
        <p style="color:var(--text2);font-size:0.8rem;margin-top:8px;">Clears cached stream URLs (forces fresh fetch).</p>
      </div>
    </div>
  </div>
</div>

<!-- Bottom Navigation -->
<div class="bottom-nav">
  <div class="nav-item active" data-page="downloader"><i class="fas fa-play-circle"></i><span>Stream</span></div>
  <div class="nav-item" data-page="admin"><i class="fas fa-crown"></i><span>Admin</span></div>
</div>

<script>
(function(){
  let isAdmin = false;
  let history = JSON.parse(localStorage.getItem('videoHistory') || '[]');

  function formatDuration(s){if(!s)return'--:--';let m=Math.floor(s/60),sec=Math.floor(s%60);return`${m}:${sec.toString().padStart(2,'0')}`;}

  // Broadcast
  async function loadBroadcast(){
    try {
      const res=await fetch('/api/settings/public'); const data=await res.json();
      document.getElementById('pageTitle').textContent = data.site_title||'NeonHub';
      if(data.broadcast_message){
        const banner=document.getElementById('broadcastBanner');
        banner.innerHTML = `<span>📢 ${data.broadcast_message}</span> <button id="dismissBroadcast" disabled>I Read (3s)</button>`;
        banner.classList.remove('hidden');
        let cnt=3; const btn=document.getElementById('dismissBroadcast');
        const int=setInterval(()=>{cnt--; if(cnt<=0){btn.textContent='I Read'; btn.disabled=false; clearInterval(int);} else btn.textContent=`I Read (${cnt}s)`;},1000);
        btn.onclick=()=>banner.classList.add('hidden');
      }
    } catch(e){}
  }
  loadBroadcast();

  // Navigation
  document.querySelectorAll('.nav-item').forEach(el=>{el.onclick=()=>{
    document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
    el.classList.add('active');
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    document.getElementById(el.dataset.page+'Page').classList.add('active');
    if(el.dataset.page==='admin') checkAdmin();
    if(el.dataset.page==='downloader') renderHistory();
  };});

  function displayPreview(title, thumb, dur, streamUrl) {
    document.getElementById('thumbnail').src = thumb;
    document.getElementById('videoTitle').textContent = title || 'Unknown';
    document.getElementById('duration').innerHTML = `<i class="far fa-clock"></i> ${formatDuration(dur)}`;
    const player = document.getElementById('videoPlayer');
    player.innerHTML = `<source src="${streamUrl}" type="video/mp4">`;
    player.load();
  }

  function setLoading(show, msg = 'Fetching stream...') {
    const lc = document.getElementById('loadingContainer');
    const sm = document.getElementById('statusMessage');
    if (show) {
      lc.classList.remove('hidden');
      sm.textContent = msg;
    } else {
      lc.classList.add('hidden');
    }
  }

  document.getElementById('extractBtn').onclick = async () => {
    const url = document.getElementById('urlInput').value.trim();
    if (!url) return showError('Enter URL');
    showError('');
    document.getElementById('previewCard').classList.add('hidden');
    setLoading(true, 'Fetching stream info...');
    try {
      const res = await fetch('/api/stream', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({url}) });
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      setLoading(false);
      displayPreview(data.title, data.thumbnail, data.duration, data.stream_url);
      document.getElementById('previewCard').classList.remove('hidden');
      addToHistory({...data, url: data.stream_url});
    } catch (e) { showError(e.message); setLoading(false); }
  };

  function showError(m){ document.getElementById('errorMessage').textContent = m; }
  document.getElementById('copyTitleBtn').onclick = () => navigator.clipboard.writeText(document.getElementById('videoTitle').textContent);

  // History
  function addToHistory(v){ 
    if(!history.find(h=>h.url===v.url)){ 
      history.unshift(v); 
      if(history.length>10) history.pop(); 
      localStorage.setItem('videoHistory', JSON.stringify(history)); 
    } 
    renderHistory(); 
  }
  function renderHistory(){
    const c = document.getElementById('historyList');
    if(!history.length){ c.innerHTML = '<p style="color:var(--text2);text-align:center;padding:20px">No videos yet.</p>'; return; }
    c.innerHTML = history.map(h => {
      return `<div class="history-item" data-url="${h.url}" data-title="${h.title}" data-thumb="${h.thumbnail}" data-duration="${h.duration}"><img src="${h.thumbnail}" class="history-thumb" onerror="this.src='https://via.placeholder.com/80x45/0a0a0a/00f3ff?text=No+thumb'"><div style="flex:1"><h4>${h.title}</h4><p>video</p></div><i class="fas fa-play-circle" style="font-size:1.5rem;color:var(--blue)"></i></div>`;
    }).join('');
    document.querySelectorAll('.history-item').forEach(el => el.onclick = () => {
      const url = el.dataset.url, title = el.dataset.title, thumb = el.dataset.thumb, duration = parseInt(el.dataset.duration);
      displayPreview(title, thumb, duration, url);
      document.getElementById('previewCard').classList.remove('hidden');
    });
  }
  document.getElementById('clearHistoryBtn').onclick = () => { if(confirm('Clear your history?')){ history = []; localStorage.removeItem('videoHistory'); renderHistory(); } };
  renderHistory();

  // Admin
  async function checkAdmin(){
    try { const r = await fetch('/api/admin/check'); const d = await r.json(); isAdmin = d.admin; document.getElementById('adminLoginPanel').classList.toggle('hidden', isAdmin); document.getElementById('adminDashboard').classList.toggle('hidden', !isAdmin); if(isAdmin) loadAdminData(); } catch(e){}
  }
  document.getElementById('adminLoginBtn').onclick = async () => {
    const pwd = document.getElementById('adminPassword').value;
    const r = await fetch('/admin/login', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({password:pwd}) });
    if(r.ok) checkAdmin(); else document.getElementById('adminLoginError').textContent = 'Wrong password';
  };
  document.getElementById('adminLogoutBtn').onclick = async () => { await fetch('/admin/logout', {method:'POST'}); checkAdmin(); };
  async function loadAdminData(){
    const r = await fetch('/api/admin/settings'); const s = await r.json();
    document.getElementById('maintenanceToggle').checked = s.maintenance_mode === 'on';
    document.getElementById('maintenanceMessage').value = s.maintenance_message || '';
    document.getElementById('siteTitleInput').value = s.site_title || 'NeonHub';
  }
  document.getElementById('saveSettingsBtn').onclick = async () => {
    await fetch('/api/admin/settings', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ maintenance_mode: document.getElementById('maintenanceToggle').checked ? 'on' : 'off', maintenance_message: document.getElementById('maintenanceMessage').value, site_title: document.getElementById('siteTitleInput').value }) });
    loadBroadcast(); alert('Saved');
  };
  document.getElementById('sendBroadcastBtn').onclick = async () => {
    const msg = document.getElementById('broadcastMsgInput').value.trim();
    if(msg){ await fetch('/api/admin/broadcast', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({message:msg}) }); document.getElementById('broadcastMsgInput').value = ''; alert('Broadcast sent'); }
  };
  document.getElementById('clearStreamCacheBtn').onclick = async () => {
    if(!confirm('Clear all cached stream URLs? This will force fresh fetches.')) return;
    try {
      const res = await fetch('/api/admin/clear-stream-cache', { method:'POST', headers:{'Content-Type':'application/json'} });
      const data = await res.json();
      alert(data.message || 'Cache cleared');
    } catch(e) { alert('Failed to clear cache'); }
  };
})();
</script>
</body>
</html>
